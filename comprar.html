<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>LINERA-NEST | Planos</title>
<style>
:root{--bg:#f6f8fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--primary:#0b1f3b;--primary2:#0f3b8c}
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1120px;margin:0 auto;padding:24px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-weight:800;font-size:26px}.muted{color:var(--muted)}.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:0;background:var(--primary);color:#fff;padding:12px 16px;border-radius:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}.hero{padding:28px 0 14px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 10px 24px rgba(15,23,42,.05)}
.price{font-size:30px;font-weight:800}.small{font-size:13px;color:var(--muted)}ul{padding-left:18px;line-height:1.7}
.bar{margin:10px 0 0;padding:10px 12px;background:#ecfeff;border:1px solid #bae6fd;border-radius:12px;font-size:14px}
.hidden{display:none!important}
@media (max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}}@media (max-width:640px){.grid{grid-template-columns:1fr}}
</style></head>
<body><div class="wrap">
  <div class="top">
    <div><div class="brand">LINERA-NEST</div><div class="muted">Escolha o plano ideal e avance para o pagamento.</div></div>
    <div class="actions">
      <a class="btn secondary" id="btnLogin" href="login.html">Entrar</a>
      <a class="btn secondary" id="btnCadastro" href="cadastro.html">Criar conta</a>
      <a class="btn secondary hidden" id="btnCliente" href="cliente.html">Área do cliente</a>
      <button class="btn secondary hidden" id="btnSair">Sair</button>
      <a class="btn secondary" id="btnAdmin" href="admin-login.html">Admin</a>
    </div>
  </div>

  <section class="hero">
    <h1>Planos para todos os tamanhos de operação</h1>
    <div class="bar">No cartão: primeira cobrança imediata e renovação automática mensal. No PIX: primeira cobrança imediata e renovação mensal enviada por e-mail.</div>
  </section>

  <div class="grid" id="plans"></div>
</div>
<script>
const WORKER = '';
const plans = [
  { pcs:2, name:'Plano Oficina', amount:2.99, bullets:['Até 2 computadores','Ideal para pequenos negócios','Mais organização na rotina']},
  { pcs:5, name:'Plano Empresa', amount:9.99, bullets:['Até 5 computadores','Perfeito para equipes em crescimento','Gestão simples da operação']},
  { pcs:10, name:'Plano Industrial', amount:19.99, bullets:['Até 10 computadores','Mais escala para a produção','Mais controle de uso']},
  { pcs:50, name:'Plano Corporativo', amount:49.99, bullets:['Até 50 computadores','Para equipes e estações amplas','Gestão centralizada de licenças']},
];
function getSession(){ try{return JSON.parse(localStorage.getItem('linera_session')||'null')}catch{return null} }
function setUi(){
  const s = getSession();
  document.getElementById('btnCliente').classList.toggle('hidden', !s);
  document.getElementById('btnSair').classList.toggle('hidden', !s);
  document.getElementById('btnCadastro').classList.toggle('hidden', !!s);
  document.getElementById('btnLogin').textContent = s ? 'Entrar em outra conta' : 'Entrar';
}
function choosePlan(pcs){
  const s=getSession();
  const next=`pagamentos.html?pcs=${encodeURIComponent(String(pcs))}`;
  if(s){ location.href=next; return; }
  location.href=`cadastro.html?next=${encodeURIComponent(next)}&pcs=${encodeURIComponent(String(pcs))}`;
}
document.getElementById('btnSair').onclick=()=>{ localStorage.removeItem('linera_session'); location.reload(); };
document.getElementById('plans').innerHTML = plans.map(p=>`
  <div class="card">
    <div class="small">${p.pcs} PCs</div>
    <h3>${p.name}</h3>
    <div class="price">R$ ${p.amount.toFixed(2).replace('.',',')}</div>
    <div class="small">por mês</div>
    <ul>${p.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
    <button class="btn" onclick="choosePlan(${p.pcs})">Escolher plano</button>
  </div>
`).join('');
setUi();
</script></body></html>
