<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1" /><title>LINERA-NEST | Escolha seu plano</title><style>:root{--bg:#f6f7fb;--card:#fff;--text:#0f172a;--muted:#475569;--line:#e2e8f0;--primary:#0b1f3b;--shadow:0 12px 28px rgba(15,23,42,.07)}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Segoe UI,Arial,sans-serif;color:var(--text)}.wrap{max-width:1100px;margin:24px auto;padding:0 16px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.btn{display:inline-flex;padding:12px 16px;border-radius:14px;text-decoration:none;font-weight:800;border:1px solid var(--line);background:#fff;color:var(--text)}.hero{background:linear-gradient(135deg,#0b1f3b,#123568);color:#fff;border-radius:22px;padding:24px;box-shadow:0 18px 35px rgba(11,31,59,.18)}.plans{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:18px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:var(--shadow);display:flex;flex-direction:column}.price{font-size:32px;font-weight:900;margin:8px 0;color:#15803d}.features{padding-left:20px;line-height:1.8;color:#334155;min-height:96px}.buy{margin-top:auto;padding:14px 16px;border:none;border-radius:16px;background:#0b1f3b;color:#fff;font-weight:800;cursor:pointer}.muted{color:#475569}@media(max-width:980px){.plans{grid-template-columns:1fr 1fr}}@media(max-width:640px){.plans{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="top"><div><strong>LINERA-NEST</strong><div class="muted" id="hello">Escolha o plano ideal para sua operação.</div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn" href="cadastro.html">Criar conta</a><a class="btn" href="login.html">Entrar</a><a class="btn" href="cliente.html">Área do cliente</a></div></div><div class="hero"><h1 style="margin:0 0 8px">Escolha seu plano</h1><div style="max-width:760px;line-height:1.55">Comece agora, organize sua operação e acompanhe tudo pela área do cliente. Cartão com renovação automática e PIX com renovação pelo portal.</div></div><div class="plans" id="plans"></div></div><script>const API='https://linera-lic.alineh-pri-ar.workers.dev'; const plans=[{pcs:2,title:'Plano Oficina',topics:['Até 2 computadores','Ideal para pequenos negócios','Mais organização na rotina']},{pcs:5,title:'Plano Empresa',topics:['Até 5 computadores','Para equipes em crescimento','Mais fluidez na operação']},{pcs:10,title:'Plano Industrial',topics:['Até 10 computadores','Para operações maiores','Mais controle e produtividade']},{pcs:50,title:'Plano Corporativo',topics:['Até 50 computadores','Para empresas com múltiplas equipes/estações','Gestão centralizada de licenças']}]; const token=localStorage.getItem('linera_token')||''; const nm=localStorage.getItem('linera_name')||''; if(token && nm) document.getElementById('hello').textContent='Olá, '+nm+'. Escolha o plano ou renove sua licença.'; async function amount(pcs){ try{ const r=await fetch(API+'/api/plan_info?pcs='+pcs,{cache:'no-store'}); const d=await r.json(); return d.amount?Number(d.amount).toFixed(2).replace('.',','):'--'; }catch{return '--';}} (async()=>{ const box=document.getElementById('plans'); for(const p of plans){ const val=await amount(p.pcs); const el=document.createElement('div'); el.className='card'; el.innerHTML=`<h2 style="margin:0">${p.title}</h2><div class="price">R$ ${val}<span style="font-size:14px;color:#475569;font-weight:700"> / mês</span></div><ul class="features">${p.topics.map(t=>`<li>${t}</li>`).join('')}</ul><button class="buy">Escolher plano</button>`; el.querySelector('.buy').onclick=()=>location.href=`pagamentos.html?pcs=${p.pcs}`; box.appendChild(el);} })();</script></body></html>
