<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Redefinir senha</title>
<style>body{font-family:Segoe UI,Arial;background:#f6f8fb;margin:0}.box{max-width:460px;margin:50px auto;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:24px}input{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;margin:8px 0 14px}.btn{background:#0b1f3b;color:#fff;border:0;border-radius:12px;padding:12px 14px;font-weight:700;width:100%}.status{margin-top:12px}</style></head>
<body><div class="box"><h2>Nova senha</h2><input id="password" type="password" placeholder="Nova senha"><button class="btn" id="btn">Salvar senha</button><div id="msg" class="status"></div></div>
<script>const WORKER='';const qp=new URLSearchParams(location.search);document.getElementById('btn').onclick=async()=>{const token=qp.get('token')||'';const password=document.getElementById('password').value;const msg=document.getElementById('msg');msg.textContent='Salvando...';try{const res=await fetch(`${WORKER}/api/reset-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password})});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||'Falha');msg.textContent='Senha alterada com sucesso.';}catch(e){msg.textContent=e.message||String(e);}};</script>
</body></html>
