<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Redefinir senha</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#f8fafc;margin:0;padding:24px;color:#0f172a}
    .box{max-width:460px;margin:40px auto;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(15,23,42,.06)}
    h2{margin:0 0 10px}
    p{margin:0 0 18px;color:#475569;line-height:1.5}
    input{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;margin:8px 0 14px;box-sizing:border-box;font-size:15px}
    .btn{background:#0f3b8c;color:#fff;border:0;border-radius:12px;padding:12px 14px;font-weight:800;width:100%;cursor:pointer;font-size:15px}
    .btn:disabled{opacity:.65;cursor:not-allowed}
    .status{margin-top:14px;font-size:14px;min-height:20px}.actions{display:flex;gap:10px;margin-top:16px}.btn-secondary{display:flex;align-items:center;justify-content:center;background:#fff;color:#0f3b8c;border:1px solid #cbd5e1;border-radius:12px;padding:12px 14px;font-weight:800;width:100%;cursor:pointer;font-size:15px;text-decoration:none;box-sizing:border-box}.btn-secondary:hover{background:#f8fafc}
  </style>
</head>
<body>
  <div class="box">
    <h2>Nova senha</h2>
    <p>Digite sua nova senha para concluir a recuperação.</p>
    <input id="password" type="password" placeholder="Nova senha" autocomplete="new-password">
    <input id="password2" type="password" placeholder="Repita a nova senha" autocomplete="new-password">
    <button class="btn" id="btn">Salvar senha</button>
    <div class="actions">
      <a class="btn-secondary" href="login.html">Entrar</a>
    </div>
    <div id="msg" class="status"></div>
  </div>

  <script>
    const WORKER = 'https://linera-lic.alineh-pri-ar.workers.dev';
    const qp = new URLSearchParams(location.search);

    document.getElementById('btn').onclick = async () => {
      const token = qp.get('token') || '';
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');

      if (!token) {
        msg.textContent = 'Link inválido.';
        return;
      }
      if (password.length < 4) {
        msg.textContent = 'A senha precisa ter pelo menos 4 caracteres.';
        return;
      }
      if (password !== password2) {
        msg.textContent = 'As senhas não conferem.';
        return;
      }

      btn.disabled = true;
      msg.textContent = 'Salvando...';

      try {
        const res = await fetch(`${WORKER}/api/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'Falha');

        msg.textContent = 'Senha alterada com sucesso. Você já pode entrar no sistema.';
      } catch (e) {
        msg.textContent = 'Não foi possível redefinir a senha. Verifique se o link ainda é válido.';
      } finally {
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
