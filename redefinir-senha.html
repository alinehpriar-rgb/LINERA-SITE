<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Redefinir senha</title><style>body{font-family:Segoe UI,Arial,sans-serif;background:#f6f7fb;margin:0}.wrap{max-width:520px;margin:40px auto;padding:0 16px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:28px}input{width:100%;padding:14px;border:1px solid #e2e8f0;border-radius:14px}button{margin-top:18px;width:100%;padding:15px;border:none;border-radius:16px;background:#0b1f3b;color:#fff;font-weight:800}.msg{margin-top:14px;padding:14px;border-radius:14px;display:none}</style></head><body><div class="wrap"><div class="card"><h1>Redefinir senha</h1><p>Escolha sua nova senha.</p><input id="password" type="password" placeholder="Nova senha"><button id="btn">Salvar nova senha</button><div id="msg" class="msg"></div></div></div><script>const API='https://linera-lic.alineh-pri-ar.workers.dev',msg=document.getElementById('msg'),token=new URLSearchParams(location.search).get('token')||'';document.getElementById('btn').onclick=async()=>{const r=await fetch(API+'/api/auth/reset_password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password:password.value})});const d=await r.json().catch(()=>({}));msg.style.display='block'; if(!r.ok||!d.ok){msg.style.background='#fef2f2';msg.style.border='1px solid #fecaca';msg.style.color='#b91c1c';msg.textContent=d.error||'Não foi possível redefinir.';return;} localStorage.setItem('linera_token',d.token); msg.style.background='#ecfdf5';msg.style.border='1px solid #bbf7d0';msg.style.color='#166534'; msg.textContent='Senha atualizada. Redirecionando...'; setTimeout(()=>location.href='cliente.html',900);};</script></body></html>
