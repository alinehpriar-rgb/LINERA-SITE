<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Esqueci a senha</title><style>body{font-family:Segoe UI,Arial,sans-serif;background:#f6f7fb;margin:0}.wrap{max-width:520px;margin:40px auto;padding:0 16px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:28px}input{width:100%;padding:14px;border:1px solid #e2e8f0;border-radius:14px}button{margin-top:18px;width:100%;padding:15px;border:none;border-radius:16px;background:#0b1f3b;color:#fff;font-weight:800}.msg{margin-top:14px;padding:14px;border-radius:14px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;display:none}</style></head><body><div class="wrap"><div class="card"><h1>Esqueci a senha</h1><p>Informe seu e-mail para receber o link de redefinição.</p><input id="email" type="email"><button id="btn">Enviar link</button><div id="msg" class="msg"></div></div></div><script>const API='https://linera-lic.alineh-pri-ar.workers.dev',msg=document.getElementById('msg');document.getElementById('btn').onclick=async()=>{const r=await fetch(API+'/api/auth/forgot_password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value.trim()})});const d=await r.json().catch(()=>({}));msg.style.display='block';msg.textContent=d.message||'Se o email existir, enviaremos um link.';};</script></body></html>
