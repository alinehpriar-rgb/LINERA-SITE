<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pagamento</title>
<style>
:root{--bg:#f6f8fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--primary:#0b1f3b}
body{margin:0;font-family:Segoe UI,Arial;background:var(--bg);color:var(--text)}.wrap{max-width:980px;margin:0 auto;padding:24px}
.card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 10px 24px rgba(15,23,42,.05)}
.tabs{display:flex;gap:10px;margin:16px 0}.tab{padding:10px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;font-weight:700}.tab.active{background:var(--primary);color:#fff}
.btn{background:var(--primary);color:#fff;border:0;border-radius:12px;padding:12px 14px;font-weight:700;cursor:pointer}
.hidden{display:none!important}.status{margin-top:12px;white-space:pre-wrap}.muted{color:var(--muted)}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{margin:10px 0}.field input{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px}
#pixBox img{max-width:240px;border:1px solid var(--line);border-radius:14px}.copy{width:100%;min-height:90px;margin-top:10px;border:1px solid #cbd5e1;border-radius:12px;padding:10px 12px}
@media (max-width:760px){.row{grid-template-columns:1fr}}
</style>
<script src="https://sdk.mercadopago.com/js/v2"></script>
<script src="https://www.mercadopago.com/v2/security.js" view="pagamentos"></script>
</head><body><div class="wrap">
  <h1>Pagamento</h1>
  <div class="muted">Cartão: cobrança imediata + renovação automática mensal. PIX: cobrança imediata + renovação mensal enviada por e-mail.</div>
  <div class="card">
    <div id="summary"></div>
    <div class="tabs">
      <button class="tab active" id="tabCard">Cartão</button>
      <button class="tab" id="tabPix">PIX</button>
    </div>
    <div id="cardBox">
      <div id="cardBrick_container"></div>
    </div>
    <div id="pixBox" class="hidden">
      <button class="btn" id="btnPix">Gerar PIX</button>
      <div id="pixArea" class="status"></div>
    </div>
    <div id="msg" class="status"></div>
  </div>
</div>
<script>
const WORKER='';
const params=new URLSearchParams(location.search);
const pcs=Number(params.get('pcs')||0);
const sess=JSON.parse(localStorage.getItem('linera_session')||'null');
if(!sess?.token){ location.href=`login.html?next=${encodeURIComponent(location.pathname+location.search)}`; }
const email=sess?.user?.email||'';
const name=sess?.user?.name||'';
let planInfo=null, mp=null, pixPaymentId='', pollTimer=null;

function authHeaders(){ return { Authorization:`Bearer ${sess.token}` } }
function showMsg(text){ document.getElementById('msg').textContent=text; }
function switchTab(tab){
  document.getElementById('tabCard').classList.toggle('active',tab==='card');
  document.getElementById('tabPix').classList.toggle('active',tab==='pix');
  document.getElementById('cardBox').classList.toggle('hidden',tab!=='card');
  document.getElementById('pixBox').classList.toggle('hidden',tab!=='pix');
}
document.getElementById('tabCard').onclick=()=>switchTab('card');
document.getElementById('tabPix').onclick=()=>switchTab('pix');

async function loadPlan(){
  const res=await fetch(`${WORKER}/api/plan_info?pcs=${encodeURIComponent(String(pcs))}`);
  const data=await res.json();
  if(!res.ok||!data.ok) throw new Error(data.error||'Plano inválido');
  planInfo=data;
  document.getElementById('summary').innerHTML=`<strong>${data.plan_name}</strong><br>Valor: R$ ${Number(data.amount).toFixed(2).replace('.',',')} por mês<br>E-mail: ${email}`;
  if(!data.public_key) throw new Error('MP_PUBLIC_KEY não encontrada.');
  mp=new MercadoPago(data.public_key,{locale:'pt-BR'});
}

function getDeviceId(){ return window.MP_DEVICE_SESSION_ID || ''; }

async function mountCard(){
  const bricks=mp.bricks();
  await bricks.create("cardPayment", "cardBrick_container", {
    initialization: { amount: Number(planInfo.amount), payer: { email } },
    customization: { visual: { hideFormTitle: true } },
    callbacks: {
      onReady: ()=>{},
      onError: (error)=>{ console.error(error); showMsg(typeof error==='string'?error:JSON.stringify(error)); },
      onSubmit: async (cardFormData) => {
        showMsg('Processando pagamento no cartão...');
        try{
          const payload = {
            email, name, pcs,
            card_token_id: cardFormData.token,
            payment_method_id: cardFormData.payment_method_id,
            issuer_id: cardFormData.issuer_id,
            installments: Number(cardFormData.installments||1),
            identification: {
              type: cardFormData.payer?.identification?.type || 'CPF',
              number: cardFormData.payer?.identification?.number || ''
            },
            device_id: getDeviceId(),
          };
          const res=await fetch(`${WORKER}/api/mp/pagar_primeira_mensalidade_cartao`,{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify(payload)});
          const data=await res.json();
          if(!res.ok||!data.ok) throw new Error(data.detail||data.error||'Falha no pagamento');
          location.href=`sucesso.html?origem=cartao&email=${encodeURIComponent(email)}&pcs=${encodeURIComponent(String(pcs))}&payment_id=${encodeURIComponent(data.payment_id||'')}&preapproval_id=${encodeURIComponent(data.preapproval_id||'')}`;
        }catch(e){ showMsg(e.message||String(e)); throw e; }
      }
    }
  });
}

async function gerarPix(){
  const box=document.getElementById('pixArea');
  box.textContent='Gerando PIX...';
  try{
    const res=await fetch(`${WORKER}/api/mp/criar_pix`,{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify({email,pcs})});
    const data=await res.json();
    if(!res.ok||!data.ok) throw new Error(data.error||'Falha ao gerar PIX');
    pixPaymentId=data.payment_id;
    box.innerHTML=`${data.qr_code_base64?`<img src="data:image/png;base64,${data.qr_code_base64}" alt="QR PIX">`:''}
      ${data.qr_code?`<textarea class="copy" readonly>${data.qr_code}</textarea>`:''}
      <div style="margin-top:12px"><button class="btn" id="copyPix">Copiar código PIX</button></div>
      <div class="muted" style="margin-top:10px">Depois do pagamento, a próxima cobrança PIX será enviada por e-mail.</div>`;
    if(document.getElementById('copyPix')) document.getElementById('copyPix').onclick=()=>navigator.clipboard.writeText(data.qr_code||'');
    startPixPolling();
  }catch(e){ box.textContent=e.message||String(e); }
}

function startPixPolling(){
  stopPixPolling();
  const loop=async()=>{
    if(!pixPaymentId) return;
    try{
      const res=await fetch(`${WORKER}/api/mp/status_pix?payment_id=${encodeURIComponent(pixPaymentId)}`,{headers:{...authHeaders()}});
      const data=await res.json();
      if(data.status==='approved'){
        stopPixPolling();
        location.href=`sucesso.html?origem=pix&email=${encodeURIComponent(email)}&pcs=${encodeURIComponent(String(pcs))}&payment_id=${encodeURIComponent(pixPaymentId)}`;
        return;
      }
    }catch(e){}
    pollTimer=setTimeout(loop,5000);
  };
  pollTimer=setTimeout(loop,4000);
}
function stopPixPolling(){ if(pollTimer){ clearTimeout(pollTimer); pollTimer=null; } }
document.getElementById('btnPix').onclick=gerarPix;

(async()=>{
  try{
    await loadPlan();
    await mountCard();
    const initialTab=(params.get('tab')||'card').toLowerCase()==='pix'?'pix':'card';
    switchTab(initialTab);
  }catch(e){ showMsg(e.message||String(e)); }
})();
</script>
</body></html>
