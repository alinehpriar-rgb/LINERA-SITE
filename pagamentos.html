<!doctype html><html lang="pt-br"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Pagamento | LINERA-NEST</title>
<style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --text:#0f172a; --muted:#475569; --primary:#0b1f3b;
      --primary-hover:#091a31; --line:#e2e8f0; --soft:#eef2f7; --green:#15803d;
      --green-soft:#ecfdf5; --danger:#b91c1c; --danger-soft:#fef2f2; --shadow:0 12px 28px rgba(15,23,42,.07);
      --shadow-strong:0 18px 35px rgba(11,31,59,.18);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:"Segoe UI",Arial,sans-serif}
    .wrap{max-width:1080px;margin:26px auto 40px;padding:0 16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px}
    .hero{background:linear-gradient(135deg,#0b1f3b 0%,#123568 100%);color:#fff;border-radius:20px;padding:22px;box-shadow:var(--shadow-strong);margin-bottom:16px}
    .hero h1{margin:0 0 8px;font-size:22px}
    .hero p{margin:0;color:rgba(255,255,255,.92);font-size:14px;line-height:1.45}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn,.btn-link{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:14px;padding:12px 16px;font-weight:800;text-decoration:none;cursor:pointer}
    .btn{background:var(--primary);color:#fff}
    .btn:hover{background:var(--primary-hover)}
    .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
    .btn.danger{background:#991b1b}
    .btn.small{padding:10px 12px;font-size:14px}
    .muted{color:var(--muted)}
    .status{margin-top:12px;padding:12px 14px;border-radius:12px;font-size:14px;line-height:1.4;display:none;white-space:pre-line}
    .status.show{display:block}
    .status.error{background:var(--danger-soft);color:var(--danger);border:1px solid #fecaca}
    .status.ok{background:var(--green-soft);color:var(--green);border:1px solid #bbf7d0}
    .status.info{background:#f8fafc;color:#334155;border:1px solid #dbe3ef}
    input,select{width:100%;border:1px solid #cbd5e1;border-radius:12px;padding:12px 14px;font-size:15px;outline:none}
    input:focus,select:focus{border-color:#94a3b8;box-shadow:0 0 0 4px rgba(11,31,59,.08)}
    label{display:block;font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
    .field{margin-top:12px}
    .grid{display:grid;gap:16px}
    .grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    @media (max-width:760px){.grid.two{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:flex-start}}

.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px} .box{background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px}
.price{font-size:30px;font-weight:800} .hidden{display:none} .qr-img{max-width:240px;border:1px solid var(--line);border-radius:12px} .pix-code{width:100%;min-height:120px} .copy-btn{margin-top:10px}
@media (max-width:900px){.layout{grid-template-columns:1fr}}
</style>
<script src="https://sdk.mercadopago.com/js/v2"></script>
<script src="https://www.mercadopago.com/v2/security.js" view="pagamentos"></script>
</head><body><div class="wrap">
<div class="topbar"><div><strong>Pagamento</strong><div class="muted">Finalize a compra usando o e-mail da sua conta.</div></div><div class="actions"><a class="btn secondary" href="cliente.html">Área do cliente</a><a class="btn secondary" href="comprar.html">Planos</a></div></div>
<div id="msg" class="status info"></div>
<div class="layout">
  <div class="box">
    <h3>Resumo do pedido</h3>
    <div class="grid">
      <div><strong>E-mail</strong><div class="muted" id="sumEmail">-</div></div>
      <div><strong>Plano</strong><div class="muted" id="sumPlan">-</div></div>
      <div><strong>Licenças</strong><div class="muted" id="sumPcs">-</div></div>
      <div><strong>Valor</strong><div class="price" id="sumPrice">R$ --</div></div>
    </div>
  </div>
  <div class="box">
    <div class="actions" style="margin-bottom:14px">
      <button class="btn" id="tabCard">Cartão</button>
      <button class="btn secondary" id="tabPix">PIX</button>
    </div>
    <div id="cardWrap">
      <div class="muted" id="cardLoader">Carregando checkout do cartão...</div>
      <div id="cardBrick_container"></div>
      <div id="cardStatus" class="status info"></div>
    </div>
    <div id="pixWrap" class="hidden">
      <div class="muted">Gere o PIX e a página acompanhará a aprovação automaticamente.</div>
      <div class="actions" style="margin-top:12px"><button class="btn" id="btnPix">Gerar PIX</button></div>
      <div id="pixArea" style="margin-top:14px"></div>
      <div id="pixStatus" class="status info"></div>
    </div>
  </div>
</div></div>
<script>
const WORKER = 'https://linera-lic.alineh-pri-ar.workers.dev';
const PLAN_NAMES = {2:'Plano Oficina',5:'Plano Equipe',10:'Plano Produção',50:'Plano Fábrica'};
function getSession(){ try{return JSON.parse(localStorage.getItem('linera_session')||'null')}catch{return null} }
function setSession(v){ localStorage.setItem('linera_session', JSON.stringify(v)); }
function clearSession(){ localStorage.removeItem('linera_session'); }
function authHeaders(extra={}){ const s=getSession(); return {'Content-Type':'application/json', ...(s?.token?{'Authorization':'Bearer '+s.token}:{}) , ...extra}; }
function showStatus(el, cls, text){ el.className='status show '+cls; el.textContent=text; }
async function api(path, opts={}){ const res=await fetch(WORKER+path, opts); const data=await res.json().catch(()=>({})); if(!res.ok || data.ok===false){ throw new Error(data.detail||data.error||'Falha na operação.'); } return data; }
function redirectAfterAuth(){
  const qp=new URLSearchParams(location.search);
  const pcs=qp.get('pcs')||localStorage.getItem('linera_checkout_pcs')||'';
  const intent=qp.get('intent')||'';
  if(intent==='checkout' && pcs){ location.href=`pagamentos.html?pcs=${encodeURIComponent(pcs)}`; return; }
  location.href='cliente.html';
}

const params=new URLSearchParams(location.search);
const session=requireAuth();
function requireAuth(){ const s=getSession(); if(!s?.token||!s?.user?.email){ const pcs=params.get('pcs')||localStorage.getItem('linera_checkout_pcs')||''; location.href=`login.html?intent=checkout&pcs=${encodeURIComponent(pcs)}`; throw new Error('unauthorized'); } return s; }
const email=(session.user.email||'').trim().toLowerCase();
const pcs=Number(params.get('pcs')||localStorage.getItem('linera_checkout_pcs')||0);
let amount=0, MP_PUBLIC_KEY='', pixPaymentId='', pollTimer=null, cardBrickController=null;
const el=id=>document.getElementById(id);
const sumEmail=el('sumEmail'), sumPlan=el('sumPlan'), sumPcs=el('sumPcs'), sumPrice=el('sumPrice'), msg=el('msg');
sumEmail.textContent=email; sumPlan.textContent=PLAN_NAMES[pcs]||`Plano ${pcs} PCs`; sumPcs.textContent=`${pcs} PCs`;
if(!pcs){ showStatus(msg,'error','Plano não informado. Volte e escolha um plano.'); }
async function loadPlanInfo(){ const data=await api(`/api/plan_info?pcs=${pcs}`); amount=Number(data.amount||0); MP_PUBLIC_KEY=String(data.public_key||'').trim(); sumPrice.textContent='R$ '+amount.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); if(!MP_PUBLIC_KEY){ throw new Error('MP_PUBLIC_KEY não configurada no Worker. Configure a variável MP_PUBLIC_KEY no Cloudflare e publique novamente.'); } }
function getDeviceId(){ return String(window.MP_DEVICE_SESSION_ID||'').trim(); }
function hideAllStatus(){ ['cardStatus','pixStatus','msg'].forEach(id=>{ const x=el(id); if(x) x.className='status info'; }); }
function show(id, cls, text){ showStatus(el(id),cls,text); }
function switchTab(tab){ el('cardWrap').classList.toggle('hidden',tab!=='card'); el('pixWrap').classList.toggle('hidden',tab!=='pix'); el('tabCard').className='btn'+(tab==='card'?'':' secondary'); el('tabPix').className='btn'+(tab==='pix'?'':' secondary'); }
el('tabCard').onclick=()=>switchTab('card'); el('tabPix').onclick=()=>switchTab('pix');
async function mountCardBrick(){
 if(!MP_PUBLIC_KEY) throw new Error('MP_PUBLIC_KEY não encontrada.');
 const mp=new MercadoPago(MP_PUBLIC_KEY,{locale:'pt-BR'});
 const bricksBuilder=mp.bricks();
 if(cardBrickController?.unmount) try{cardBrickController.unmount()}catch{}
 cardBrickController=await bricksBuilder.create('cardPayment','cardBrick_container',{
   initialization:{amount,payer:{email}},
   customization:{paymentMethods:{maxInstallments:1}},
   callbacks:{
     onReady:()=>{ el('cardLoader').style.display='none'; },
     onError:(error)=>{ el('cardLoader').style.display='none'; show('cardStatus','error', error?.message || 'Erro ao montar checkout do cartão.'); },
     onSubmit:async(cardFormData)=>{
       show('cardStatus','info','Processando pagamento no cartão...');
       try {
         const token=cardFormData?.token;
         if(!token) throw new Error('O token do cartão não foi retornado.');
         const data=await api('/api/mp/pagar_primeira_mensalidade_cartao',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
           email, pcs,
           card_token_id: token,
           payment_method_id: cardFormData?.payment_method_id||'',
           issuer_id: cardFormData?.issuer_id||'',
           installments: Number(cardFormData?.installments||1)||1,
           identification: {
             type: cardFormData?.payer?.identification?.type || '',
             number: cardFormData?.payer?.identification?.number || '',
           },
           device_id: getDeviceId(),
         })});
         localStorage.setItem('linera_checkout_ref', data.checkout_ref || '');
         localStorage.setItem('linera_pcs', String(pcs));
         location.href=`sucesso.html?email=${encodeURIComponent(email)}&pcs=${encodeURIComponent(String(pcs))}&checkout_ref=${encodeURIComponent(data.checkout_ref||'')}&preapproval_id=${encodeURIComponent(data.preapproval_id||'')}&origem=cartao`;
       } catch(e) { show('cardStatus','error',e.message||String(e)); }
     }
   }
 });
}
async function gerarPix(){
  show('pixStatus','info','Gerando PIX...');
  try {
    const data=await api('/api/mp/criar_pix',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,pcs,device_id:getDeviceId()})});
    pixPaymentId=String(data.payment_id||'');
    localStorage.setItem('linera_pix_payment_id', pixPaymentId);
    el('pixArea').innerHTML=`${data.qr_code_base64 ? `<img class="qr-img" src="data:image/png;base64,${data.qr_code_base64}" alt="QR PIX"/>` : ''}
      ${data.qr_code ? `<textarea class="pix-code" readonly>${data.qr_code}</textarea><button class="btn secondary copy-btn" id="copyPix">Copiar código PIX</button>`:''}`;
    const copy=el('copyPix'); if(copy) copy.onclick=async()=>{ await navigator.clipboard.writeText(data.qr_code||''); show('pixStatus','ok','Código PIX copiado.'); };
    startPixPolling();
    show('pixStatus','info','PIX gerado com sucesso. Aguardando pagamento...');
  } catch(e) { show('pixStatus','error',e.message||String(e)); }
}
function stopPixPolling(){ if(pollTimer) clearTimeout(pollTimer); pollTimer=null; }
async function checkPix(){
  if(!pixPaymentId) return;
  try {
    const data=await api(`/api/mp/status_pix?payment_id=${encodeURIComponent(pixPaymentId)}&email=${encodeURIComponent(email)}&pcs=${encodeURIComponent(String(pcs))}`);
    if(data.status==='approved' || data.license_status==='active') {
      stopPixPolling();
      location.href=`sucesso.html?email=${encodeURIComponent(email)}&pcs=${encodeURIComponent(String(pcs))}&payment_id=${encodeURIComponent(pixPaymentId)}&origem=pix`;
      return;
    }
  } catch(e) {}
  pollTimer=setTimeout(checkPix,5000);
}
function startPixPolling(){ stopPixPolling(); pollTimer=setTimeout(checkPix,5000); }
el('btnPix').onclick=gerarPix;
(async()=>{ try{ await loadPlanInfo(); await mountCardBrick(); }catch(e){ show('msg','error',e.message||String(e)); el('cardLoader').style.display='none'; const cardWrap = el('cardWrap'); if(cardWrap){ const c = el('cardBrick_container'); if(c) c.innerHTML=''; } } })();
</script></body></html>
