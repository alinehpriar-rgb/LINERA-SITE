<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Área do cliente</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--primary:#0f3b8c;--danger:#b91c1c}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:26px 18px} .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .btn{background:var(--primary);color:#fff;border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .btn.secondary{background:#fff;color:#111;border:1px solid var(--line)} .btn.danger{background:var(--danger)} .btn.link{background:transparent;color:#64748b;border:0;padding:0;font-weight:700}
    .card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 12px 28px rgba(15,23,42,.05)} .status{margin:12px 0;white-space:pre-wrap}
    .password-row,.grid-2{display:grid;grid-template-columns:1fr 1fr auto;gap:10px} .grid-2{grid-template-columns:1fr 1fr}
    input{padding:12px 14px;border:1px solid #cbd5e1;border-radius:14px;font-size:15px;outline:none;width:100%} input:focus{border-color:#8fb0ee;box-shadow:0 0 0 4px rgba(15,59,140,.08)} input[disabled]{background:#f8fafc;color:#64748b}
    .licenses{display:grid;grid-template-columns:1fr;gap:18px;margin-top:18px} .license-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .subtle{color:var(--muted)} .kv{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0} .kv .box{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fafcff}
    .row-actions{display:flex;gap:10px;flex-wrap:wrap} .panel{margin-top:14px;padding:16px;border:1px dashed #cbd5e1;border-radius:18px;background:#fff} .panel h4{margin:0 0 10px}
    .muted{color:var(--muted)} .pix-area img{max-width:220px;border:1px solid var(--line);border-radius:12px} .pix-area textarea{width:100%;min-height:92px;margin-top:10px;padding:10px;border:1px solid #cbd5e1;border-radius:12px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:16px} label{display:block;font-size:12px;font-weight:800;color:#475569;margin-bottom:6px}
    .method-switch{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.method-pill{padding:10px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:800}.method-pill.active{background:var(--primary);border-color:var(--primary);color:#fff}.hidden{display:none!important}
    .tiny-actions{display:flex;justify-content:flex-end;margin-top:8px} .danger-link{font-size:12px;color:#94a3b8;background:none;border:0;cursor:pointer;text-decoration:underline}
    @media (max-width:860px){.password-row,.kv,.two,.grid-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div><h1>Área do cliente</h1><div class="subtle" id="userLine"></div></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn secondary" href="comprar.html">Ver planos</a><button class="btn secondary" id="btnSair">Sair</button></div>
  </div>
  <div id="msg" class="status"></div>

  <div class="card" style="margin-top:14px">
    <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap">
      <div><h3 style="margin:0 0 6px">Dados cadastrais</h3><div class="muted">Esses dados são usados nas cobranças por cartão. O e-mail não pode ser alterado.</div></div>
      <div class="tiny-actions"><button class="danger-link" id="btnDeleteAccount">Excluir conta</button></div>
    </div>
    <div class="grid-2" style="margin-top:14px">
      <div><label for="name">Nome</label><input id="name"></div>
      <div><label for="email">E-mail</label><input id="email" disabled></div>
      <div><label for="cpf_cnpj">CPF ou CNPJ</label><input id="cpf_cnpj"></div>
      <div><label for="phone">Telefone / celular</label><input id="phone"></div>
      <div><label for="cep">CEP</label><input id="cep"></div>
      <div><label for="city">Cidade</label><input id="city"></div>
      <div><label for="state">Estado</label><input id="state" maxlength="2"></div>
      <div><label for="address_number">Número</label><input id="address_number"></div>
      <div style="grid-column:1/-1"><label for="address">Logradouro</label><input id="address"></div>
    </div>
    <div style="margin-top:14px"><button class="btn" id="btnProfile">Salvar cadastro</button></div>
  </div>

  <div class="card" style="margin-top:14px">
    <h3 style="margin-top:0">Trocar senha</h3>
    <div class="password-row"><input id="old_password" type="password" placeholder="Senha atual"><input id="new_password" type="password" placeholder="Nova senha"><button class="btn" id="btnPass">Salvar senha</button></div>
  </div>

  <div class="licenses" id="licGrid"></div>
</div>
<script>
const WORKER='https://linera-lic.alineh-pri-ar.workers.dev';
const sess=JSON.parse(localStorage.getItem('linera_session')||'null'); if(!sess?.token){ location.href='login.html'; }
const byId=(id)=>document.getElementById(id); const msg=byId('msg'); let currentUser=null; let pixTimers={};
function authHeaders(extra={}){ return { Authorization:`Bearer ${sess.token}`,'Content-Type':'application/json', ...extra } }
function showMsg(t){ msg.textContent=t||''; } function formatDateBr(v){ if(!v) return '-'; const d=new Date(v); return isNaN(d)?String(v).slice(0,10):d.toLocaleDateString('pt-BR'); }
function methodLabel(lic){ if(lic.renewal_method==='pix_subscription') return 'PIX recorrente'; if(lic.renewal_method==='manual_pix_email') return 'PIX'; if(lic.renewal_method==='card_auto') return 'Cartão de crédito'; return lic.billing_label || '-'; }
function nextChargeLabel(lic){ return lic.next_charge_date ? formatDateBr(lic.next_charge_date) : formatDateBr(lic.valid_until); }
function pad2(v){ return String(v || '').padStart(2,'0'); }
function cardDisplayLabel(lic){ if(lic.renewal_method !== 'card_auto') return ''; const brand=lic.card_brand || lic.billing_label || 'Cartão'; const last4=String(lic.card_last4 || '').trim(); return last4 ? `${brand} •••• ${last4}` : brand; }
function cardExpiryLabel(lic){ const month=String(lic.card_exp_month || '').trim(); const year=String(lic.card_exp_year || '').trim(); if(!month || !year) return ''; return `${pad2(month)}/${String(year).slice(-2)}`; }
function onlyDigits(v){ return String(v||'').replace(/\D+/g,''); }
function maskCpfCnpj(v){ const d=onlyDigits(v).slice(0,14); if(d.length<=11) return d.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2'); return d.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d{1,2})$/,'$1-$2'); }
function maskPhone(v){ const d=onlyDigits(v).slice(0,11); if(d.length<=10) return d.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{4})(\d)/,'$1-$2'); return d.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2'); }
function maskCep(v){ return onlyDigits(v).slice(0,8).replace(/(\d{5})(\d)/,'$1-$2'); } function maskCard(v){ return onlyDigits(v).slice(0,16).replace(/(\d{4})(?=\d)/g,'$1 ').trim(); } function maskExpiry(v){ const d=onlyDigits(v).slice(0,4); return d.replace(/(\d{2})(\d)/,'$1/$2'); } function maskCvv(v){ return onlyDigits(v).slice(0,4); }
['cpf_cnpj','phone','cep'].forEach(id=>byId(id).addEventListener('input',e=>{ if(id==='cpf_cnpj') e.target.value=maskCpfCnpj(e.target.value); if(id==='phone') e.target.value=maskPhone(e.target.value); if(id==='cep') e.target.value=maskCep(e.target.value); }));
byId('state').addEventListener('input',e=>e.target.value=e.target.value.replace(/[^a-z]/gi,'').toUpperCase().slice(0,2));
async function api(path, opts={}){ const res=await fetch(`${WORKER}${path}`,opts); const data=await res.json(); if(!res.ok||!data.ok) throw new Error(data.detail||data.error||'Falha'); return data; }
function fillProfile(user){ currentUser=user; byId('userLine').textContent=`${user.name} • ${user.email}`; byId('name').value=user.name||''; byId('email').value=user.email||''; byId('cpf_cnpj').value=maskCpfCnpj(user.cpf_cnpj||''); byId('phone').value=maskPhone(user.phone||''); byId('cep').value=maskCep(user.cep||''); byId('city').value=user.city||''; byId('state').value=(user.state||'').toUpperCase(); byId('address').value=user.address||''; byId('address_number').value=user.address_number||''; sess.user=user; localStorage.setItem('linera_session',JSON.stringify(sess)); }
function paymentPanelHtml(lic){ const currentChoice = lic.renewal_method==='card_auto' ? 'card' : 'pix'; return `
  <div class="panel"><h4>Alterar meio de pagamento</h4><div class="muted">Meio atual: <strong>${methodLabel(lic)}</strong></div>${lic.renewal_method==='card_auto'?`<div class="muted" style="margin-top:6px">Cartão em uso: <strong>${cardDisplayLabel(lic)}</strong>${cardExpiryLabel(lic)?` • validade ${cardExpiryLabel(lic)}`:''}</div>`:''}
  <div class="method-switch">
    <button type="button" class="method-pill ${currentChoice==='pix'?'active':''}" id="payChoicePix_${lic.pcs}" onclick="selectPaymentMethodPanel(${lic.pcs},'pix')">PIX</button>
    <button type="button" class="method-pill ${currentChoice==='card'?'active':''}" id="payChoiceCard_${lic.pcs}" onclick="selectPaymentMethodPanel(${lic.pcs},'card')">Cartão de crédito</button>
  </div>
  <div id="methodPix_${lic.pcs}" class="${currentChoice==='pix'?'':'hidden'}" style="margin-top:14px">
    <div class="card" style="padding:16px;border-radius:18px;box-shadow:none">
      <h4 style="margin:0 0 10px">PIX recorrente</h4>
      <div class="muted">Ao confirmar esta troca, a assinatura já existente no Asaas passa a usar <strong>PIX recorrente</strong> sem cancelar a assinatura atual. Se o Asaas já disponibilizar uma cobrança PIX pendente, o QR Code aparecerá logo abaixo.</div>
      <div style="margin-top:12px"><button class="btn secondary" onclick="switchToPixRecurring(${lic.pcs})">Usar PIX recorrente</button></div>
      <div class="pix-area" id="pixArea_${lic.pcs}" style="margin-top:12px"></div>
    </div>
  </div>
  <div id="methodCard_${lic.pcs}" class="${currentChoice==='card'?'':'hidden'}" style="margin-top:14px">
    <div class="card" style="padding:16px;border-radius:18px;box-shadow:none">
      <h4 style="margin:0 0 10px">Usar outro cartão nas próximas cobranças</h4>
      <div class="muted">Os dados do titular e endereço serão reaproveitados do seu cadastro. Informe somente o novo cartão.</div>
      <div class="grid-2" style="margin-top:12px">
        <div style="grid-column:1/-1"><label>Titular no cartão</label><input id="holder_name_${lic.pcs}" value="${(currentUser?.name||'').replace(/"/g,'&quot;')}"></div>
        <div style="grid-column:1/-1"><label>Número do cartão</label><input id="card_number_${lic.pcs}" inputmode="numeric" placeholder="0000 0000 0000 0000"></div>
        <div><label>Validade</label><input id="card_expiry_${lic.pcs}" inputmode="numeric" placeholder="MM/AA"></div>
        <div><label>CVV</label><input id="card_cvv_${lic.pcs}" inputmode="numeric" placeholder="123"></div>
      </div>
      <div style="margin-top:12px"><button class="btn" onclick="saveNewCard(${lic.pcs})">Salvar cartão</button></div>
    </div>
  </div></div>`; }
async function load(){ const data=await api('/api/client/overview',{headers:authHeaders()}); fillProfile(data.user); const grid=byId('licGrid'); if(!data.licenses.length){ grid.innerHTML='<div class="card">Você ainda não possui licenças ativas.</div>'; return; }
  grid.innerHTML=data.licenses.map(lic=>`<div class="card"><div class="license-head"><div><div class="subtle">${lic.pcs} PCs</div><h3 style="margin:8px 0 0">${lic.plan_name}</h3></div></div><div class="kv"><div class="box"><strong>Status</strong><br>${lic.status}</div><div class="box"><strong>Validade</strong><br>${formatDateBr(lic.valid_until)}</div><div class="box"><strong>Slots em uso</strong><br>${lic.devices_active||0}</div><div class="box"><strong>Meio de pagamento</strong><br>${methodLabel(lic)}</div><div class="box"><strong>Valor</strong><br>R$ ${Number(lic.amount||0).toFixed(2).replace('.',',')}</div><div class="box"><strong>Próxima renovação</strong><br>${nextChargeLabel(lic)}</div></div><div class="muted">${lic.renewal_note||''}</div><div class="row-actions" style="margin-top:16px"><a class="btn" href="${WORKER}/api/licenca?email=${encodeURIComponent(lic.email)}&pcs=${encodeURIComponent(String(lic.pcs))}" target="_blank">Baixar licença</a><button class="btn secondary" onclick="clearSlots(${lic.pcs})">Esvaziar slots</button><button class="btn secondary" onclick="togglePaymentPanel(${lic.pcs})">Alterar meio de pagamento</button><button class="btn danger" onclick="cancelSignatureFlow(${lic.pcs})">Cancelar assinatura</button></div><div id="paymentPanel_${lic.pcs}" style="display:none;margin-top:14px"></div></div>`).join(''); }
async function saveProfile(){ try{ const data=await api('/api/client/update-profile',{method:'POST',headers:authHeaders(),body:JSON.stringify({ name:byId('name').value.trim(), cpf_cnpj:byId('cpf_cnpj').value, phone:byId('phone').value, cep:byId('cep').value, city:byId('city').value.trim(), state:byId('state').value.trim(), address:byId('address').value.trim(), address_number:byId('address_number').value.trim() })}); fillProfile(data.user); showMsg('Cadastro atualizado com sucesso.'); }catch(e){ showMsg(e.message||String(e)); } }
async function clearSlots(pcs){ try{ await api('/api/client/clear-slots',{method:'POST',headers:authHeaders(),body:JSON.stringify({pcs})}); showMsg('Slots limpos.'); load(); }catch(e){ showMsg(e.message||String(e)); } }
function selectPaymentMethodPanel(pcs,method){
  const pixBtn=byId(`payChoicePix_${pcs}`), cardBtn=byId(`payChoiceCard_${pcs}`), pixBox=byId(`methodPix_${pcs}`), cardBox=byId(`methodCard_${pcs}`);
  if(pixBtn) pixBtn.classList.toggle('active',method==='pix');
  if(cardBtn) cardBtn.classList.toggle('active',method==='card');
  if(pixBox) pixBox.classList.toggle('hidden',method!=='pix');
  if(cardBox) cardBox.classList.toggle('hidden',method!=='card');
}
function renderPixResult(pcs,data){
  const box=byId(`pixArea_${pcs}`); if(!box) return;
  if(data?.qr_code || data?.qr_code_base64){
    box.innerHTML=`${data.qr_code_base64?`<img src="data:image/png;base64,${data.qr_code_base64}" alt="QR PIX">`:''}${data.qr_code?`<textarea readonly>${data.qr_code}</textarea>`:''}<div class="row-actions" style="margin-top:10px"><button class="btn secondary" id="copy_${pcs}">Copiar código PIX</button></div><div class="muted" style="margin-top:8px">Pague este QR Code quando quiser concluir a etapa pendente do PIX recorrente.</div>`;
    const copyBtn=byId(`copy_${pcs}`); if(copyBtn) copyBtn.onclick=()=>navigator.clipboard.writeText(data.qr_code||'');
  } else {
    box.innerHTML=`<div class="muted">${data?.detail || 'A assinatura foi alterada para PIX recorrente. O Asaas passará a gerar as próximas cobranças em PIX.'}</div>`;
  }
}
async function togglePaymentPanel(pcs){ const panel=byId(`paymentPanel_${pcs}`); if(panel.style.display==='block'){ panel.style.display='none'; panel.innerHTML=''; return; } const data=await api('/api/client/overview',{headers:authHeaders()}); const lic=(data.licenses||[]).find(x=>Number(x.pcs)===Number(pcs)); if(!lic) return; panel.innerHTML=paymentPanelHtml(lic); panel.style.display='block'; const cn=byId(`card_number_${pcs}`), ce=byId(`card_expiry_${pcs}`), cv=byId(`card_cvv_${pcs}`); if(cn) cn.addEventListener('input',e=>e.target.value=maskCard(e.target.value)); if(ce) ce.addEventListener('input',e=>e.target.value=maskExpiry(e.target.value)); if(cv) cv.addEventListener('input',e=>e.target.value=maskCvv(e.target.value)); }
async function saveNewCard(pcs){ try{ showMsg('Atualizando cartão da assinatura...'); const data=await api('/api/client/update-card-method',{method:'POST',headers:authHeaders(),body:JSON.stringify({ pcs, holder_name:byId(`holder_name_${pcs}`).value.trim(), card_number:byId(`card_number_${pcs}`).value, card_expiry:byId(`card_expiry_${pcs}`).value, card_cvv:byId(`card_cvv_${pcs}`).value })}); showMsg(data.scheduled_only?'Mudança para cartão agendada com sucesso.':(data.license_reactivated?'Cartão salvo e licença reativada com sucesso.':'Cartão atualizado com sucesso.')); await load(); byId(`paymentPanel_${pcs}`).style.display='none'; byId(`paymentPanel_${pcs}`).innerHTML=''; }catch(e){ showMsg(e.message||String(e)); } }
async function switchToPixRecurring(pcs){
  try{
    showMsg('Alterando assinatura para PIX recorrente...');
    const data=await api('/api/client/set-payment-method',{method:'POST',headers:authHeaders(),body:JSON.stringify({pcs, method:'pix_subscription'})});
    showMsg(data.detail||'Assinatura alterada para PIX recorrente com sucesso.');
    renderPixResult(pcs,data);
    if(data.payment_id){ startPixPolling(pcs,data.payment_id); }
    else { await load(); }
  }catch(e){ showMsg(e.message||String(e)); }
}
function startPixPolling(pcs,paymentId){ if(pixTimers[pcs]) clearTimeout(pixTimers[pcs]); const loop=async()=>{ try{ const data=await api(`/api/mp/status_pix?payment_id=${encodeURIComponent(paymentId)}`,{headers:{Authorization:`Bearer ${sess.token}`}}); if(data.status==='approved'){ showMsg('Pagamento PIX confirmado. Sua licença foi renovada.'); await load(); return; } }catch(e){} pixTimers[pcs]=setTimeout(loop,5000); }; pixTimers[pcs]=setTimeout(loop,4000); }
async function cancelSignatureFlow(pcs){ if(!confirm('Deseja realmente cancelar esta assinatura? Ela será cancelada no Asaas e removida do sistema.')) return; try{ await api('/api/client/cancel-signature',{method:'POST',headers:authHeaders(),body:JSON.stringify({pcs})}); showMsg('Assinatura cancelada e removida com sucesso.'); await load(); }catch(e){ showMsg(e.message||String(e)); } }
async function deleteAccountFlow(){ if(!confirm('Tem certeza que deseja excluir sua conta? Isso cancela e remove todas as assinaturas vinculadas ao seu e-mail.')) return; try{ await api('/api/client/cancel-account',{method:'POST',headers:authHeaders(),body:JSON.stringify({delete_account:true})}); localStorage.removeItem('linera_session'); alert('Conta excluída com sucesso.'); location.href='comprar.html'; }catch(e){ showMsg(e.message||String(e)); } }
byId('btnProfile').onclick=saveProfile; byId('btnDeleteAccount').onclick=deleteAccountFlow;
byId('btnPass').onclick=async()=>{ try{ await api('/api/client/change-password',{method:'POST',headers:authHeaders(),body:JSON.stringify({old_password:old_password.value,new_password:new_password.value})}); showMsg('Senha alterada.'); old_password.value=''; new_password.value=''; }catch(e){ showMsg(e.message||String(e)); } };
byId('btnSair').onclick=()=>{ localStorage.removeItem('linera_session'); location.href='comprar.html'; };
load().catch(e=>showMsg(e.message||String(e)));
</script>
</body>
</html>
