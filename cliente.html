<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Área do cliente | LINERA-NEST</title><style>:root{--bg:#f6f7fb;--card:#fff;--text:#0f172a;--muted:#475569;--line:#e2e8f0;--primary:#0b1f3b;--danger:#b91c1c;}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Segoe UI,Arial,sans-serif;color:var(--text)}.wrap{max-width:1100px;margin:26px auto;padding:0 16px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px}.btn{display:inline-flex;padding:12px 16px;border-radius:14px;text-decoration:none;font-weight:800;border:1px solid #e2e8f0;background:#fff;color:#0f172a;cursor:pointer}.primary{background:#0b1f3b;color:#fff;border-color:#0b1f3b}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 12px 28px rgba(15,23,42,.07)}.licenses{display:grid;gap:12px}.license{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fafcff} .muted{color:#475569} .row{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap} .msg{margin-top:12px;padding:12px;border-radius:12px;display:none}</style></head><body><div class="wrap"><div class="top"><div><h1 style="margin:0">Área do cliente</h1><div class="muted" id="hello"></div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><a class="btn" href="comprar_portal.html">Comprar / renovar</a><button class="btn" id="logout">Sair</button></div></div><div class="grid"><div class="card"><h2 style="margin-top:0">Minhas licenças</h2><div id="licenses" class="licenses"></div><div id="msg" class="msg"></div></div><div class="card"><h2 style="margin-top:0">Conta</h2><p class="muted">Use esta área para acompanhar sua licença, trocar senha e solicitar reenvio da licença por e-mail.</p><button class="btn" id="resend">Reenviar última licença por e-mail</button> <button class="btn" id="cancel">Solicitar cancelamento</button><hr style="border:none;border-top:1px solid #e2e8f0;margin:18px 0"><h3>Trocar senha</h3><input id="current" type="password" placeholder="Senha atual" style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:10px"><input id="newpwd" type="password" placeholder="Nova senha" style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:12px"><button class="btn primary" style="margin-top:12px" id="changePwd">Salvar nova senha</button></div></div></div>
<script>
const API='https://linera-lic.alineh-pri-ar.workers.dev', token=localStorage.getItem('linera_token')||''; if(!token) location.href='login.html';
const msg=document.getElementById('msg'); function flash(t,ok=false){msg.style.display='block';msg.textContent=t;msg.style.background=ok?'#ecfdf5':'#fef2f2';msg.style.border='1px solid '+(ok?'#bbf7d0':'#fecaca');msg.style.color=ok?'#166534':'#b91c1c';}
async function api(path, options={}){ options.headers=Object.assign({'Authorization':'Bearer '+token}, options.headers||{}); const r=await fetch(API+path,options); const d=await r.json().catch(()=>({})); if(!r.ok||d.ok===false) throw new Error(d.error||d.detail||'Erro'); return d; }
async function load(){ try{ const d=await api('/api/customer/license'); document.getElementById('hello').textContent=(d.customer?.name||'Cliente')+' · '+(d.customer?.email||''); const box=document.getElementById('licenses'); box.innerHTML=''; (d.licenses||[]).forEach(lic=>{ const div=document.createElement('div'); div.className='license'; const devices=Object.keys(lic.devices||{}); div.innerHTML=`<div class="row"><strong>${lic.plan_name||('Plano '+lic.pcs+' PCs')}</strong><span class="muted">${lic.status||''}</span></div><div class="muted">Validade: ${lic.valid_until||'-'}</div><div class="muted">Assinatura: ${lic.subscription_id||'—'}</div><div class="muted">Slots ativos: ${devices.length} / ${lic.pcs}</div>`; if(devices.length){ const area=document.createElement('div'); area.style.marginTop='10px'; area.innerHTML=devices.map(id=>`<button class="btn" data-pcs="${lic.pcs}" data-id="${id}">Esvaziar slot ${id.slice(0,10)}...</button>`).join(' '); div.appendChild(area); } box.appendChild(div); }); if(!(d.licenses||[]).length) box.innerHTML='<div class="license">Nenhuma licença encontrada ainda.</div>'; document.querySelectorAll('[data-id]').forEach(b=>b.onclick=async()=>{ try{ await api('/api/customer/clear_device',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pcs:Number(b.dataset.pcs),device_id:b.dataset.id})}); flash('Slot liberado com sucesso.',true); load(); }catch(e){ flash(e.message); } }); }catch(e){ flash(e.message); } }
load();
document.getElementById('logout').onclick=()=>{ localStorage.removeItem('linera_token'); location.href='login.html'; };
document.getElementById('changePwd').onclick=async()=>{ try{ await api('/api/customer/change_password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_password:current.value,new_password:newpwd.value})}); flash('Senha atualizada com sucesso.',true); current.value=''; newpwd.value=''; }catch(e){ flash(e.message); } };
document.getElementById('resend').onclick=async()=>{ try{ const d=await api('/api/customer/license'); const lic=(d.licenses||[])[0]; if(!lic) return flash('Nenhuma licença para reenviar.'); await api('/api/customer/resend_license',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pcs:lic.pcs})}); flash('Reenvio solicitado. O e-mail ficou na fila do sistema.',true); }catch(e){ flash(e.message); } };
document.getElementById('cancel').onclick=async()=>{ try{ const d=await api('/api/customer/license'); const lic=(d.licenses||[])[0]; if(!lic) return flash('Nenhuma assinatura encontrada.'); await api('/api/customer/cancel_subscription',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pcs:lic.pcs})}); flash('Pedido de cancelamento registrado.',true); }catch(e){ flash(e.message); } };
</script></body></html>
