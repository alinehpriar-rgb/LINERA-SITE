<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Área do cliente</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--primary:#173f93;--primary-dark:#13357a;--danger:#b91c1c}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:26px 18px 60px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .btn{background:var(--primary);color:#fff;border:0;border-radius:14px;padding:12px 16px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .btn:hover{background:var(--primary-dark)} .btn.secondary{background:#fff;color:#111;border:1px solid var(--line)} .btn.danger{background:var(--danger)}
    .card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 12px 28px rgba(15,23,42,.05)}
    .status{margin:12px 0;white-space:pre-wrap}.muted,.subtle{color:var(--muted)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.full{grid-column:1/-1}
    label{display:block;font-size:13px;font-weight:700;color:#334155;margin-bottom:6px}
    input{width:100%;padding:14px 16px;border:1px solid #cbd5e1;border-radius:14px;font-size:15px;outline:none;transition:.15s}
    input:focus{border-color:#7aa2ec;box-shadow:0 0 0 3px rgba(23,63,147,.10)}
    .licenses{display:grid;grid-template-columns:1fr;gap:18px;margin-top:18px}.license-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:8px}
    .kv{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0}.kv .box{padding:14px;border:1px solid var(--line);border-radius:16px;background:#fafcff}
    .row-actions{display:flex;gap:10px;flex-wrap:wrap}.panel{margin-top:14px;padding:16px;border:1px dashed #cbd5e1;border-radius:18px;background:#fff}.panel h4{margin:0 0 10px}
    .delete-zone{display:flex;justify-content:flex-end;margin-top:18px}.link-danger{font-size:12px;color:#991b1b;text-decoration:none;opacity:.8}.link-danger:hover{opacity:1;text-decoration:underline}
    @media (max-width:860px){.grid,.kv{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Área do cliente</h1>
      <div class="subtle" id="userLine"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <a class="btn secondary" href="comprar.html">Ver planos</a>
      <button class="btn secondary" id="btnSair">Sair</button>
    </div>
  </div>

  <div id="msg" class="status"></div>

  <div class="card" style="margin-top:14px">
    <h3 style="margin-top:0">Meu cadastro</h3>
    <div class="grid">
      <div class="full"><label for="name">Nome</label><input id="name"></div>
      <div><label for="email">E-mail</label><input id="email" disabled></div>
      <div><label for="cpf_cnpj">CPF ou CNPJ</label><input id="cpf_cnpj"></div>
      <div><label for="cep">CEP</label><input id="cep"></div>
      <div><label for="city">Cidade</label><input id="city"></div>
      <div><label for="state">Estado</label><input id="state" maxlength="2"></div>
      <div class="full"><label for="street">Logradouro</label><input id="street"></div>
      <div><label for="address_number">Número</label><input id="address_number"></div>
    </div>
    <div class="row-actions" style="margin-top:14px">
      <button class="btn" id="btnSaveProfile">Salvar cadastro</button>
    </div>
  </div>

  <div class="card" style="margin-top:14px">
    <h3 style="margin-top:0">Trocar senha</h3>
    <div class="grid">
      <div><label for="old_password">Senha atual</label><input id="old_password" type="password"></div>
      <div><label for="new_password">Nova senha</label><input id="new_password" type="password"></div>
    </div>
    <div class="row-actions" style="margin-top:14px">
      <button class="btn" id="btnPass">Salvar senha</button>
    </div>
  </div>

  <div class="licenses" id="licGrid"></div>

  <div class="delete-zone">
    <a href="#" class="link-danger" id="btnDeleteAccount">Excluir conta</a>
  </div>
</div>

<script>
const WORKER='https://linera-lic.alineh-pri-ar.workers.dev';
const sess=JSON.parse(localStorage.getItem('linera_session')||'null');
if(!sess?.token){ location.href='login.html'; }
const $=id=>document.getElementById(id);
function authHeaders(extra={}){ return { Authorization:`Bearer ${sess.token}`,'Content-Type':'application/json', ...extra } }
function showMsg(t){ $('msg').textContent=t||''; }
function formatDateBr(v){ if(!v) return '-'; const d=new Date(v); return isNaN(d)?String(v).slice(0,10):d.toLocaleDateString('pt-BR'); }
function onlyDigits(v){ return String(v||'').replace(/\D+/g,''); }
function maskCpfCnpj(v){ const d=onlyDigits(v).slice(0,14); if(d.length<=11) return d.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2'); return d.replace(/(\d{2})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1/$2').replace(/(\d{4})(\d{1,2})$/,'$1-$2'); }
function maskCep(v){ const d=onlyDigits(v).slice(0,8); return d.replace(/(\d{5})(\d)/,'$1-$2'); }
function maskCard(v){ return onlyDigits(v).slice(0,16).replace(/(.{4})/g,'$1 ').trim(); }
function maskExpiry(v){ const d=onlyDigits(v).slice(0,4); return d.length<3?d:d.slice(0,2)+'/'+d.slice(2); }
function maskPhone(v){ const d=onlyDigits(v).slice(0,11); if(d.length<=10) return d.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{4})(\d)/,'$1-$2'); return d.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2'); }
$('cpf_cnpj').addEventListener('input',e=>e.target.value=maskCpfCnpj(e.target.value));
$('cep').addEventListener('input',e=>e.target.value=maskCep(e.target.value));
$('state').addEventListener('input',e=>e.target.value=String(e.target.value||'').replace(/[^a-z]/gi,'').toUpperCase().slice(0,2));
async function api(path, opts={}){ const res=await fetch(`${WORKER}${path}`,opts); const data=await res.json(); if(!res.ok||!data.ok) throw new Error(data.detail||data.error||'Falha'); return data; }
function methodLabel(lic){ if(lic.renewal_method==='manual_pix_email') return 'PIX'; if(lic.renewal_method==='card_auto') return 'Cartão de crédito'; return lic.billing_label || '-'; }
function cardDisplayLabel(lic){ const brand=lic.card_brand || lic.billing_label || 'Cartão'; const last4=String(lic.card_last4||'').trim(); return last4?`${brand} •••• ${last4}`:brand; }
function pendingCardLabel(lic){ const brand=lic.pending_card_brand || 'Cartão'; const last4=String(lic.pending_card_last4||'').trim(); return last4?`${brand} •••• ${last4}`:brand; }
function renderProfile(user){
  $('userLine').textContent=`${user.name} • ${user.email}`;
  $('name').value=user.name||''; $('email').value=user.email||''; $('cpf_cnpj').value=maskCpfCnpj(user.cpf_cnpj||''); $('cep').value=maskCep(user.cep||'');
  $('city').value=user.city||''; $('state').value=user.state||''; $('street').value=user.street||''; $('address_number').value=user.address_number||'';
}
function paymentPanel(lic){
  const canScheduleText = lic.renewal_method === 'manual_pix_email' && String(lic.status||'').toLowerCase()==='active'
    ? 'Ao cadastrar um cartão agora, a cobrança futura ficará preparada para a próxima renovação.'
    : 'Informe apenas os dados do novo cartão. O restante será usado a partir do seu cadastro.';
  return `
    <div class="panel" id="panel-card-${lic.pcs}" style="display:none">
      <h4>Atualizar cartão</h4>
      <div class="muted" style="margin-bottom:10px">${canScheduleText}</div>
      <div class="grid">
        <div class="full"><input id="card_number_${lic.pcs}" placeholder="Número do cartão"></div>
        <div><input id="card_expiry_${lic.pcs}" placeholder="Validade MM/AA"></div>
        <div><input id="card_cvv_${lic.pcs}" placeholder="CVV"></div>
        <div class="full"><input id="phone_${lic.pcs}" placeholder="Celular com DDD (opcional)"></div>
      </div>
      <div class="row-actions" style="margin-top:12px"><button class="btn" onclick="saveCard(${lic.pcs})">Salvar cartão</button><button class="btn secondary" onclick="togglePanel('panel-card-${lic.pcs}')">Fechar</button></div>
    </div>
    <div class="panel" id="panel-pix-${lic.pcs}" style="display:none">
      <h4>Trocar para PIX</h4>
      <div class="muted" style="margin-bottom:10px">Mantendo a lógica atual do sistema, o próximo ciclo seguirá para o fluxo de PIX.</div>
      <div class="row-actions"><button class="btn" onclick="setPix(${lic.pcs})">Usar PIX</button><button class="btn secondary" onclick="togglePanel('panel-pix-${lic.pcs}')">Fechar</button></div>
    </div>`;
}
function renderLicenses(licenses){
  const grid=$('licGrid');
  if(!licenses.length){ grid.innerHTML='<div class="card">Nenhuma licença encontrada para esta conta.</div>'; return; }
  grid.innerHTML=licenses.map(lic=>`
    <div class="card">
      <div class="license-head">
        <div>
          <h3 style="margin:0">${lic.plan_name || ('Plano '+lic.pcs+' PCs')}</h3>
          <div class="subtle">${lic.email}</div>
        </div>
        <div class="subtle">Status: <strong>${String(lic.status||'-').toUpperCase()}</strong></div>
      </div>
      <div class="kv">
        <div class="box"><div class="subtle">Plano</div><div><strong>${lic.pcs} PCs</strong></div></div>
        <div class="box"><div class="subtle">Validade</div><div><strong>${formatDateBr(lic.valid_until)}</strong></div></div>
        <div class="box"><div class="subtle">Slots em uso</div><div><strong>${lic.devices_active || 0}/${lic.pcs}</strong></div></div>
        <div class="box"><div class="subtle">Cobrança</div><div><strong>${methodLabel(lic)}</strong></div></div>
        <div class="box"><div class="subtle">Cartão atual</div><div><strong>${lic.renewal_method==='card_auto'?cardDisplayLabel(lic):'-'}</strong></div></div>
        <div class="box"><div class="subtle">Próxima referência</div><div><strong>${formatDateBr(lic.next_charge_date || lic.valid_until)}</strong></div></div>
      </div>
      ${lic.pending_change_type==='pix_to_card' ? `<div class="muted" style="margin-bottom:10px">Mudança agendada: ${pendingCardLabel(lic)} será usado na próxima renovação.</div>` : ''}
      <div class="row-actions">
        <button class="btn secondary" onclick="clearSlots(${lic.pcs})">Liberar slots</button>
        <button class="btn secondary" onclick="togglePanel('panel-card-${lic.pcs}')">Alterar cartão</button>
        <button class="btn secondary" onclick="togglePanel('panel-pix-${lic.pcs}')">Mudar para PIX</button>
        <button class="btn danger" onclick="cancelSub(${lic.pcs})">Cancelar assinatura</button>
      </div>
      ${paymentPanel(lic)}
    </div>`).join('');
  licenses.forEach(lic=>{
    const cn=$("card_number_"+lic.pcs), ce=$("card_expiry_"+lic.pcs), cv=$("card_cvv_"+lic.pcs), ph=$("phone_"+lic.pcs);
    if(cn) cn.addEventListener('input',e=>e.target.value=maskCard(e.target.value));
    if(ce) ce.addEventListener('input',e=>e.target.value=maskExpiry(e.target.value));
    if(cv) cv.addEventListener('input',e=>e.target.value=onlyDigits(e.target.value).slice(0,4));
    if(ph) ph.addEventListener('input',e=>e.target.value=maskPhone(e.target.value));
  });
}
function togglePanel(id){ const el=$(id); if(el) el.style.display=el.style.display==='none'?'block':'none'; }
async function load(){
  const data=await api('/api/client/overview',{headers:authHeaders()});
  renderProfile(data.user); renderLicenses(data.licenses || []);
}
$('btnSaveProfile').onclick=async()=>{
  try{
    const data=await api('/api/client/update-profile',{method:'POST',headers:authHeaders(),body:JSON.stringify({
      name:$('name').value.trim(), cpf_cnpj:$('cpf_cnpj').value.trim(), cep:$('cep').value.trim(), city:$('city').value.trim(), state:$('state').value.trim(), street:$('street').value.trim(), address_number:$('address_number').value.trim()
    })});
    sess.user=data.user; localStorage.setItem('linera_session',JSON.stringify(sess)); showMsg('Cadastro atualizado com sucesso.'); renderProfile(data.user);
  }catch(e){ showMsg(e.message||String(e)); }
};
$('btnPass').onclick=async()=>{ try{ await api('/api/client/change-password',{method:'POST',headers:authHeaders(),body:JSON.stringify({old_password:$('old_password').value,new_password:$('new_password').value})}); showMsg('Senha atualizada com sucesso.'); $('old_password').value=''; $('new_password').value=''; }catch(e){ showMsg(e.message||String(e)); } };
$('btnSair').onclick=()=>{ localStorage.removeItem('linera_session'); location.href='login.html'; };
window.clearSlots=async pcs=>{ if(!confirm('Liberar todos os slots em uso desta licença?')) return; try{ await api('/api/client/clear-slots',{method:'POST',headers:authHeaders(),body:JSON.stringify({pcs})}); showMsg('Slots liberados com sucesso.'); await load(); }catch(e){ showMsg(e.message||String(e)); } };
window.setPix=async pcs=>{ if(!confirm('Deseja trocar a renovação desta licença para PIX?')) return; try{ await api('/api/client/set-payment-method',{method:'POST',headers:authHeaders(),body:JSON.stringify({pcs,method:'manual_pix_email'})}); showMsg('Forma de pagamento alterada para PIX.'); await load(); }catch(e){ showMsg(e.message||String(e)); } };
window.saveCard=async pcs=>{ try{ const data=await api('/api/client/update-card-method',{method:'POST',headers:authHeaders(),body:JSON.stringify({ pcs, phone:($('phone_'+pcs)?.value||'').trim(), card_number:($('card_number_'+pcs)?.value||'').trim(), card_expiry:($('card_expiry_'+pcs)?.value||'').trim(), card_cvv:($('card_cvv_'+pcs)?.value||'').trim() })}); showMsg(data.scheduled_only ? 'Mudança para cartão agendada com sucesso.' : (data.license_reactivated ? 'Cartão salvo e licença reativada com sucesso.' : 'Cartão atualizado com sucesso.')); await load(); }catch(e){ showMsg(e.message||String(e)); } };
window.cancelSub=async pcs=>{ if(!confirm('Deseja realmente cancelar a assinatura desta licença?')) return; try{ await api('/api/client/cancel-subscription',{method:'POST',headers:authHeaders(),body:JSON.stringify({pcs})}); showMsg('Assinatura cancelada.'); await load(); }catch(e){ showMsg(e.message||String(e)); } };
$('btnDeleteAccount').onclick=async(e)=>{ e.preventDefault(); if(!confirm('Excluir a conta inteira? Isso cancela todas as assinaturas e remove o acesso.')) return; try{ await api('/api/client/cancel-account',{method:'POST',headers:authHeaders(),body:JSON.stringify({delete_account:true})}); localStorage.removeItem('linera_session'); location.href='login.html'; }catch(err){ showMsg(err.message||String(err)); } };
(async()=>{ try{ await load(); }catch(e){ showMsg(e.message||String(e)); } })();
</script>
</body>
</html>
