<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Criar conta | LINERA-NEST</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#dbe4ee;--primary:#0f3b8c;--primary-dark:#0b2c69;--soft:#eef4ff}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:860px;margin:40px auto;padding:0 16px}
    .box{background:#fff;border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 14px 28px rgba(15,23,42,.05)}
    h1{margin:0 0 10px;font-size:32px}
    .muted{color:var(--muted);line-height:1.6}.status{margin-top:12px;white-space:pre-wrap}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
    .full{grid-column:1/-1}
    label{display:block;font-size:13px;font-weight:700;color:#475569;margin:0 0 6px}
    input{width:100%;padding:14px 16px;border:1px solid #cbd5e1;border-radius:16px;font-size:16px;outline:none;transition:.18s background,.18s border-color,.18s box-shadow}
    input:focus{border-color:#8fb0ee;box-shadow:0 0 0 4px rgba(15,59,140,.08)}
    .btn{background:var(--primary);color:#fff;border:0;border-radius:16px;padding:14px 18px;font-weight:800;font-size:16px;width:100%;cursor:pointer;margin-top:18px}
    .btn:hover{background:var(--primary-dark)}
    .tip{background:var(--soft);border:1px solid #c7dafd;border-radius:16px;padding:14px 16px;margin-top:18px;font-size:14px;line-height:1.6}
    .footer{margin-top:14px;color:var(--muted)}
    @media (max-width:760px){.grid{grid-template-columns:1fr}.wrap{margin:18px auto}.box{padding:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <h1>Criar conta</h1>
      <div class="muted">Cadastre seus dados uma única vez. Depois, no pagamento, você informa somente os dados do cartão.</div>

      <div class="tip"><strong>Importante:</strong> CPF/CNPJ, telefone e endereço serão usados para preencher os dados do titular nas cobranças. O e-mail não poderá ser alterado depois.</div>

      <div class="grid">
        <div class="full"><label for="name">Nome completo</label><input id="name" placeholder="Seu nome completo"></div>
        <div><label for="email">E-mail</label><input id="email" type="email" placeholder="voce@empresa.com"></div>
        <div><label for="password">Senha</label><input id="password" type="password" placeholder="Crie uma senha"></div>
        <div><label for="cpf_cnpj">CPF ou CNPJ</label><input id="cpf_cnpj" placeholder="000.000.000-00"></div>
        <div><label for="phone">Telefone / celular com DDD</label><input id="phone" placeholder="(11) 99999-9999"></div>
        <div><label for="cep">CEP</label><input id="cep" placeholder="00000-000"></div>
        <div><label for="city">Cidade</label><input id="city" placeholder="Sua cidade"></div>
        <div><label for="state">Estado</label><input id="state" maxlength="2" placeholder="UF"></div>
        <div class="full"><label for="address">Logradouro</label><input id="address" placeholder="Rua, avenida, estrada..."></div>
        <div><label for="address_number">Número</label><input id="address_number" placeholder="123"></div>
      </div>

      <button class="btn" id="btn">Criar conta</button>
      <div class="footer">Já tem conta? <a href="login.html">Entrar</a></div>
      <div id="msg" class="status"></div>
    </div>
  </div>

<script>
const WORKER='https://linera-lic.alineh-pri-ar.workers.dev';
const qp=new URLSearchParams(location.search);
const byId=(id)=>document.getElementById(id);
const msg=byId('msg');

function onlyDigits(v){ return String(v||'').replace(/\D+/g,''); }
function maskCpfCnpj(v){
  const d=onlyDigits(v).slice(0,14);
  if(d.length<=11){
    return d.replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d)/,'$1.$2').replace(/(\d{3})(\d{1,2})$/,'$1-$2');
  }
  return d.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d{1,2})$/,'$1-$2');
}
function maskPhone(v){
  const d=onlyDigits(v).slice(0,11);
  if(d.length<=10) return d.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{4})(\d)/,'$1-$2');
  return d.replace(/(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2');
}
function maskCep(v){ return onlyDigits(v).slice(0,8).replace(/(\d{5})(\d)/,'$1-$2'); }

byId('cpf_cnpj').addEventListener('input',e=>e.target.value=maskCpfCnpj(e.target.value));
byId('phone').addEventListener('input',e=>e.target.value=maskPhone(e.target.value));
byId('cep').addEventListener('input',e=>e.target.value=maskCep(e.target.value));
byId('state').addEventListener('input',e=>e.target.value=e.target.value.replace(/[^a-z]/gi,'').toUpperCase().slice(0,2));

byId('btn').onclick=async()=>{
  const payload={
    name:byId('name').value.trim(),
    email:byId('email').value.trim(),
    password:byId('password').value,
    cpf_cnpj:byId('cpf_cnpj').value,
    phone:byId('phone').value,
    cep:byId('cep').value,
    city:byId('city').value.trim(),
    state:byId('state').value.trim(),
    address:byId('address').value.trim(),
    address_number:byId('address_number').value.trim()
  };
  msg.textContent='Cadastrando...';
  try{
    const res=await fetch(`${WORKER}/api/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    if(!res.ok||!data.ok) throw new Error(data.detail||data.error||'Falha no cadastro');
    localStorage.setItem('linera_session',JSON.stringify({token:data.token,user:data.user}));
    location.href=qp.get('next')||'cliente.html';
  }catch(e){ msg.textContent=e.message||String(e); }
};
</script>
</body>
</html>
