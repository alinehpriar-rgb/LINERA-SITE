<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cadastro | LINERA-NEST</title>
<style>
:root{--bg:#f6f7fb;--card:#fff;--text:#0f172a;--muted:#475569;--line:#e2e8f0;--primary:#0b1f3b;--ok:#15803d;--danger:#b91c1c;}
*{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)} .wrap{max-width:520px;margin:40px auto;padding:0 16px} .card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 12px 28px rgba(15,23,42,.07)} h1{margin:0 0 8px} p{color:var(--muted)} label{display:block;font-weight:700;margin:16px 0 6px} input{width:100%;padding:14px 16px;border:1px solid var(--line);border-radius:14px} button{margin-top:18px;width:100%;padding:15px;border:none;border-radius:16px;background:var(--primary);color:#fff;font-weight:800;cursor:pointer} .msg{margin-top:16px;padding:14px;border-radius:14px;display:none;white-space:pre-line} .ok{display:block;background:#ecfdf5;border:1px solid #bbf7d0;color:#166534} .err{display:block;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c} .links{margin-top:16px;text-align:center}</style></head>
<body><div class="wrap"><div class="card"><h1>Criar conta</h1><p>Cadastre-se para acompanhar sua licença, renovar e gerenciar seus computadores.</p>
<label>Nome</label><input id="name" autocomplete="name">
<label>E-mail</label><input id="email" type="email" autocomplete="email">
<label>Senha</label><input id="password" type="password" autocomplete="new-password">
<button id="btn">Criar conta</button><div id="msg" class="msg"></div><div class="links"><a href="login.html">Já tenho conta</a></div></div></div>
<script>
const API='https://linera-lic.alineh-pri-ar.workers.dev'; const msg=document.getElementById('msg');
function show(t,ok=false){msg.className='msg '+(ok?'ok':'err');msg.style.display='block';msg.textContent=t;}
document.getElementById('btn').onclick=async()=>{
 const body={name:name.value.trim(),email:email.value.trim(),password:password.value};
 const r=await fetch(API+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
 const d=await r.json().catch(()=>({}));
 if(!r.ok||!d.ok) return show(d.error||'Não foi possível cadastrar.');
 localStorage.setItem('linera_token',d.token); localStorage.setItem('linera_email',d.customer.email); localStorage.setItem('linera_name',d.customer.name||'');
 location.href='comprar_portal.html';
};
</script></body></html>
