<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Criar conta</title>
<style>body{font-family:Segoe UI,Arial;background:#f6f8fb;margin:0}.box{max-width:480px;margin:50px auto;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:24px}input{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;margin:8px 0 14px}.btn{background:#0b1f3b;color:#fff;border:0;border-radius:12px;padding:12px 14px;font-weight:700;width:100%}.muted{color:#64748b}.status{margin-top:12px;white-space:pre-wrap}</style>
</head><body><div class="box">
<h2>Criar conta</h2><div class="muted">Crie sua conta para seguir no pagamento ou acessar sua área do cliente.</div>
<input id="name" placeholder="Nome">
<input id="email" type="email" placeholder="E-mail">
<input id="password" type="password" placeholder="Senha">
<button class="btn" id="btn">Criar conta</button>
<p class="muted">Já tem conta? <a href="login.html">Entrar</a></p>
<div id="msg" class="status"></div>
</div>
<script>
const WORKER='';
const qp=new URLSearchParams(location.search);
document.getElementById('btn').onclick=async()=>{
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const msg=document.getElementById('msg');
  msg.textContent='Cadastrando...';
  try{
    const res=await fetch(`${WORKER}/api/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password})});
    const data=await res.json();
    if(!res.ok||!data.ok) throw new Error(data.error||'Falha no cadastro');
    localStorage.setItem('linera_session',JSON.stringify({token:data.token,user:data.user}));
    location.href = qp.get('next') || 'cliente.html';
  }catch(e){ msg.textContent=e.message||String(e); }
};
</script></body></html>
