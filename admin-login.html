<!doctype html>
<html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin login</title>
<style>body{font-family:Segoe UI,Arial;background:#f8fafc;margin:0}.box{max-width:420px;margin:50px auto;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:24px}input{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;margin:8px 0 14px}.btn{background:#0f3b8c;color:#fff;border:0;border-radius:12px;padding:12px 14px;font-weight:800;width:100%}.status{margin-top:12px}</style></head>
<body><div class="box"><h2>Painel admin</h2><div>Use sua chave admin ou o login do e-mail admin configurado.</div><input id="key" placeholder="ADMIN_KEY"><button class="btn" id="btnKey">Entrar com chave</button><div style="height:1px;background:#e2e8f0;margin:16px 0"></div><input id="email" type="email" placeholder="E-mail admin"><input id="password" type="password" placeholder="Senha"><button class="btn" id="btnLogin">Entrar com conta</button><div id="msg" class="status"></div></div>
<script>
const WORKER='https://linera-lic.alineh-pri-ar.workers.dev'; const msg=document.getElementById('msg');
document.getElementById('btnKey').onclick=()=>{ const key=document.getElementById('key').value.trim(); if(!key){msg.textContent='Informe a chave.'; return;} localStorage.setItem('linera_admin_key',key); location.href='admin.html'; };
document.getElementById('btnLogin').onclick=async()=>{ const email=document.getElementById('email').value.trim(); const password=document.getElementById('password').value; msg.textContent='Entrando...'; try{ const res=await fetch(`${WORKER}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})}); const data=await res.json(); if(!res.ok||!data.ok) throw new Error(data.error||'Falha'); localStorage.setItem('linera_session',JSON.stringify({token:data.token,user:data.user})); location.href='admin.html'; }catch(e){ msg.textContent=e.message||String(e); } };
</script></body></html>
