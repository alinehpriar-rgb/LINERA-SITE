<!doctype html><html lang="pt-br"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entrar</title><style>body{font-family:Segoe UI,Arial;background:#f8fafc;margin:0}.box{max-width:460px;margin:50px auto;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:24px}input{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:12px;margin:8px 0 14px}.btn{background:#0f3b8c;color:#fff;border:0;border-radius:12px;padding:12px 14px;font-weight:800;width:100%}.muted{color:#64748b}.status{margin-top:12px;white-space:pre-wrap}</style></head><body><div class="box"><h2>Entrar</h2><input id="email" type="email" placeholder="E-mail"><input id="password" type="password" placeholder="Senha"><button class="btn" id="btn">Entrar</button><p class="muted"><a href="esqueci-senha.html">Esqueci a senha</a></p><div id="msg" class="status"></div></div><script>const WORKER='';const qp=new URLSearchParams(location.search);document.getElementById('btn').onclick=async()=>{const email=document.getElementById('email').value.trim();const password=document.getElementById('password').value;const msg=document.getElementById('msg');msg.textContent='Entrando...';try{const res=await fetch(`${WORKER}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const data=await res.json();if(!res.ok||!data.ok)throw new Error(data.error||'Falha no login');localStorage.setItem('linera_session',JSON.stringify({token:data.token,user:data.user}));location.href=qp.get('next')||'cliente.html';}catch(e){msg.textContent=e.message||String(e);}};</script></body></html>
